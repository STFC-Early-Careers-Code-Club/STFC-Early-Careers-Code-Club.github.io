name: Slidev Source Check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'slidev-src/**'

jobs:
  validate-slides:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check Slidev Build
        # If this command returns a non-zero exit code, the job fails
        run: npm run build:slides